name: Build KnightOS ISO

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview, rust-src, rustfmt, clippy

      - name: Install Cargo Tools
        run: |
          cargo install cargo-binutils

      - name: Install GRUB, ISO tools and Assembler
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin xorriso mtools binutils

      
      - name: Run Build Script
        run: |
          chmod +x ./build.sh
          ./build.sh

      
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: knightos-iso
          path: knightos.iso
          if-no-files-found: error

      
      - name: Compile Custom Tests
        run: cargo test --no-run

      
      - name: Check Formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      
      - name: Run Clippy Lints
        run: cargo clippy -- -D warnings
        continue-on-error: true

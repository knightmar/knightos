name: Build KnightOS ISO

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Install Cargo Tools
        run: |
          cargo install cargo-binutils

      - name: Install GRUB and ISO creation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y grub-pc-bin xorriso mtools

      - name: Install i686-elf Toolchain
        run: |
          mkdir -p $HOME/opt/cross
          curl -Lo i686-elf-tools.tar.xz https://github.com/stivale/stivale/releases/download/v0.1.0/i686-elf-tools-linux.tar.xz
          tar -xf i686-elf-tools.tar.xz -C $HOME/opt/cross
          echo "$HOME/opt/cross/bin" >> $GITHUB_PATH

      - name: Run Build Script
        run: |
          chmod +x ./build.sh
          
          ./build.sh

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: knightos-iso
          path: knightos.iso
          if-no-files-found: error